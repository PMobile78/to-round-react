<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToRound — Aurora Glass concept</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0e1a;
    --glass: rgba(255, 255, 255, 0.06);
    --glass-border: rgba(255, 255, 255, 0.12);
    --text: #eef1ff;
    --text-dim: #8b93b8;
    --accent: #7c6cff;
    --accent-2: #38d9c3;
    --pink: #ff6b9d;
    --amber: #ffb454;
    --radius: 20px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  /* ---- animated aurora background ---- */
  .aurora { position: fixed; inset: 0; z-index: 0; filter: blur(90px); opacity: .55; }
  .aurora span { position: absolute; border-radius: 50%; }
  .aurora span:nth-child(1) { width: 50vw; height: 50vw; background: #5b3df5; top: -15%; left: -10%; animation: drift1 18s ease-in-out infinite alternate; }
  .aurora span:nth-child(2) { width: 40vw; height: 40vw; background: #0e7a6d; bottom: -10%; right: -5%; animation: drift2 22s ease-in-out infinite alternate; }
  .aurora span:nth-child(3) { width: 30vw; height: 30vw; background: #a3266b; top: 40%; left: 45%; animation: drift3 26s ease-in-out infinite alternate; }
  @keyframes drift1 { to { transform: translate(12vw, 8vh) scale(1.15); } }
  @keyframes drift2 { to { transform: translate(-10vw, -6vh) scale(0.9); } }
  @keyframes drift3 { to { transform: translate(-8vw, 10vh) scale(1.2); } }

  .app { position: relative; z-index: 1; display: grid; grid-template-columns: 280px 1fr; grid-template-rows: 72px 1fr; height: 100vh; }

  /* ---- top bar ---- */
  header {
    grid-column: 1 / 3;
    display: flex; align-items: center; gap: 20px;
    padding: 0 28px;
    background: rgba(11, 14, 26, 0.55);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--glass-border);
  }
  .logo { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 22px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }
  .logo .dot { width: 26px; height: 26px; border-radius: 50%; background: conic-gradient(from 120deg, var(--accent), var(--accent-2), var(--pink), var(--accent)); box-shadow: 0 0 18px rgba(124,108,255,.7); }
  .search {
    flex: 1; max-width: 420px; display: flex; align-items: center; gap: 10px;
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 99px; padding: 10px 18px; color: var(--text-dim); font-size: 14px;
    transition: border-color .2s;
  }
  .search:hover { border-color: rgba(124,108,255,.6); }
  .spacer { flex: 1; }
  .view-toggle { display: flex; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 99px; padding: 4px; }
  .view-toggle button {
    border: 0; background: transparent; color: var(--text-dim); font: inherit; font-size: 13px; font-weight: 500;
    padding: 7px 18px; border-radius: 99px; cursor: pointer;
  }
  .view-toggle button.active { background: linear-gradient(135deg, var(--accent), #5b3df5); color: #fff; box-shadow: 0 4px 14px rgba(124,108,255,.45); }
  .avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, var(--amber), var(--pink)); display: grid; place-items: center; font-weight: 600; font-size: 14px; color: #1a1030; }

  /* ---- sidebar: categories ---- */
  aside {
    margin: 20px 0 20px 20px;
    background: var(--glass); border: 1px solid var(--glass-border);
    backdrop-filter: blur(24px);
    border-radius: var(--radius);
    padding: 22px 18px;
    display: flex; flex-direction: column; gap: 6px;
    overflow-y: auto;
  }
  aside h2 { font-family: 'Sora', sans-serif; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.4px; color: var(--text-dim); margin: 0 8px 12px; }
  .cat {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 12px; border-radius: 13px; cursor: pointer; font-size: 14px; font-weight: 500;
    border: 1px solid transparent; transition: background .15s, border-color .15s;
  }
  .cat:hover { background: rgba(255,255,255,.05); }
  .cat.active { background: rgba(124,108,255,.16); border-color: rgba(124,108,255,.4); }
  .cat .swatch { width: 12px; height: 12px; border-radius: 4px; flex-shrink: 0; }
  .cat .count { margin-left: auto; font-size: 12px; color: var(--text-dim); background: rgba(255,255,255,.07); border-radius: 99px; padding: 2px 9px; }
  .sidebar-footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--glass-border); }
  .ghost-btn {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
    background: transparent; border: 1px dashed rgba(255,255,255,.25); color: var(--text-dim);
    font: inherit; font-size: 13px; padding: 11px; border-radius: 13px; cursor: pointer; transition: all .2s;
  }
  .ghost-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ---- bubble canvas ---- */
  main { position: relative; margin: 20px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--glass-border); background: rgba(255,255,255,.02); }
  .bubble {
    position: absolute; border-radius: 50%;
    display: grid; place-items: center; text-align: center;
    font-family: 'Sora', sans-serif; font-weight: 600; cursor: grab;
    padding: 18px; line-height: 1.3;
    backdrop-filter: blur(8px);
    transition: transform .25s cubic-bezier(.34,1.56,.64,1);
  }
  .bubble:hover { transform: scale(1.07); }
  .bubble small { display: block; font-family: 'Inter', sans-serif; font-weight: 400; font-size: 11px; opacity: .75; margin-top: 5px; }
  .b-violet { background: radial-gradient(circle at 30% 25%, rgba(151,134,255,.55), rgba(91,61,245,.28)); border: 1px solid rgba(151,134,255,.5); box-shadow: 0 0 36px rgba(124,108,255,.35), inset 0 0 24px rgba(151,134,255,.18); }
  .b-teal   { background: radial-gradient(circle at 30% 25%, rgba(56,217,195,.5), rgba(14,122,109,.25)); border: 1px solid rgba(56,217,195,.5); box-shadow: 0 0 36px rgba(56,217,195,.28), inset 0 0 24px rgba(56,217,195,.15); }
  .b-pink   { background: radial-gradient(circle at 30% 25%, rgba(255,107,157,.5), rgba(163,38,107,.25)); border: 1px solid rgba(255,107,157,.5); box-shadow: 0 0 36px rgba(255,107,157,.3), inset 0 0 24px rgba(255,107,157,.15); }
  .b-amber  { background: radial-gradient(circle at 30% 25%, rgba(255,180,84,.5), rgba(166,98,12,.25)); border: 1px solid rgba(255,180,84,.5); box-shadow: 0 0 36px rgba(255,180,84,.28), inset 0 0 24px rgba(255,180,84,.15); }
  .float-a { animation: floatA 7s ease-in-out infinite alternate; }
  .float-b { animation: floatB 9s ease-in-out infinite alternate; }
  .float-c { animation: floatC 8s ease-in-out infinite alternate; }
  @keyframes floatA { to { translate: 14px -20px; } }
  @keyframes floatB { to { translate: -18px 14px; } }
  @keyframes floatC { to { translate: 10px 18px; } }

  .due-badge {
    position: absolute; top: -6px; right: 6px;
    background: var(--pink); color: #fff; font-family: 'Inter', sans-serif;
    font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 99px;
    box-shadow: 0 0 14px rgba(255,107,157,.8);
  }

  .hint {
    position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
    background: rgba(11,14,26,.6); backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border); border-radius: 99px;
    padding: 9px 22px; font-size: 12.5px; color: var(--text-dim); white-space: nowrap;
  }

  /* ---- FAB ---- */
  .fab {
    position: fixed; right: 44px; bottom: 44px; z-index: 5;
    width: 62px; height: 62px; border-radius: 50%; border: 0; cursor: pointer;
    background: linear-gradient(135deg, var(--accent), #5b3df5);
    color: #fff; font-size: 30px; line-height: 1;
    box-shadow: 0 8px 30px rgba(124,108,255,.55), 0 0 0 1px rgba(255,255,255,.15) inset;
    transition: transform .2s cubic-bezier(.34,1.56,.64,1);
  }
  .fab:hover { transform: scale(1.1) rotate(90deg); }
</style>
</head>
<body>
  <div class="aurora"><span></span><span></span><span></span></div>

  <div class="app">
    <header>
      <div class="logo"><span class="dot"></span>ToRound</div>
      <div class="search">⌕&nbsp; Search tasks…</div>
      <div class="spacer"></div>
      <div class="view-toggle">
        <button class="active">Bubbles</button>
        <button>List</button>
        <button>Mind map</button>
      </div>
      <div class="avatar">DT</div>
    </header>

    <aside>
      <h2>Categories</h2>
      <div class="cat active"><span class="swatch" style="background:#7c6cff"></span>Work<span class="count">8</span></div>
      <div class="cat"><span class="swatch" style="background:#38d9c3"></span>Home<span class="count">4</span></div>
      <div class="cat"><span class="swatch" style="background:#ff6b9d"></span>Health<span class="count">3</span></div>
      <div class="cat"><span class="swatch" style="background:#ffb454"></span>Ideas<span class="count">6</span></div>
      <div class="cat"><span class="swatch" style="background:#566085"></span>No category<span class="count">2</span></div>
      <div class="sidebar-footer">
        <button class="ghost-btn">+ New category</button>
      </div>
    </aside>

    <main>
      <div class="bubble b-violet float-a" style="width:190px;height:190px;top:14%;left:10%">
        Ship release 0.0.56
        <small>Work · today</small>
        <span class="due-badge">due 18:00</span>
      </div>
      <div class="bubble b-teal float-b" style="width:150px;height:150px;top:52%;left:24%">
        Water the plants
        <small>Home</small>
      </div>
      <div class="bubble b-pink float-c" style="width:170px;height:170px;top:22%;left:46%">
        Morning run 5 km
        <small>Health · repeats daily</small>
      </div>
      <div class="bubble b-amber float-a" style="width:130px;height:130px;top:60%;left:55%">
        Mind-map for Q3
        <small>Ideas</small>
      </div>
      <div class="bubble b-violet float-b" style="width:120px;height:120px;top:12%;left:74%">
        Code review
        <small>Work</small>
      </div>
      <div class="bubble b-teal float-c" style="width:105px;height:105px;top:48%;left:78%">
        Buy groceries
        <small>Home</small>
      </div>
      <div class="hint">🤏 Drag bubbles around · 👆 Tap a bubble to edit</div>
    </main>
  </div>

  <button class="fab" title="Add bubble">+</button>
</body>
</html>
