<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToRound — Neo-Brutalist concept</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f5f0e6;
    --ink: #16130e;
    --yellow: #ffd43b;
    --lime: #b9f73e;
    --coral: #ff7a5c;
    --sky: #6cc7ff;
    --lilac: #c9a8ff;
    --shadow: 5px 5px 0 var(--ink);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--paper);
    background-image: radial-gradient(var(--ink) 1px, transparent 1px);
    background-size: 26px 26px;
    background-position: 0 0;
    color: var(--ink);
    height: 100vh; overflow: hidden;
    display: grid; grid-template-rows: 78px 1fr; grid-template-columns: 290px 1fr;
  }

  /* ---- header ---- */
  header {
    grid-column: 1 / 3;
    display: flex; align-items: center; gap: 18px;
    background: var(--paper);
    border-bottom: 3px solid var(--ink);
    padding: 0 24px;
  }
  .logo {
    font-family: 'Archivo', sans-serif; font-weight: 900; font-size: 26px; letter-spacing: -1px;
    background: var(--yellow); border: 3px solid var(--ink); box-shadow: var(--shadow);
    padding: 6px 16px; transform: rotate(-1.5deg);
  }
  .logo span { color: var(--coral); -webkit-text-stroke: 1.5px var(--ink); }
  .search {
    flex: 1; max-width: 430px;
    border: 3px solid var(--ink); background: #fff; box-shadow: var(--shadow);
    padding: 11px 16px; font-size: 15px; font-weight: 500; color: #777;
  }
  .spacer { flex: 1; }
  .tab-group { display: flex; }
  .tab {
    border: 3px solid var(--ink); border-right-width: 0; background: #fff;
    font: inherit; font-weight: 700; font-size: 14px; padding: 10px 20px; cursor: pointer;
    text-transform: uppercase; letter-spacing: .5px;
  }
  .tab:last-child { border-right-width: 3px; box-shadow: var(--shadow); }
  .tab.active { background: var(--lime); }
  .tab:hover:not(.active) { background: var(--paper); }
  .avatar {
    width: 46px; height: 46px; border: 3px solid var(--ink); border-radius: 50%;
    background: var(--sky); display: grid; place-items: center;
    font-weight: 700; box-shadow: 3px 3px 0 var(--ink);
  }

  /* ---- sidebar ---- */
  aside {
    border-right: 3px solid var(--ink);
    background: #fff;
    padding: 24px 18px;
    display: flex; flex-direction: column; gap: 12px;
    overflow-y: auto;
  }
  aside h2 {
    font-family: 'Archivo', sans-serif; font-weight: 900; font-size: 15px;
    text-transform: uppercase; letter-spacing: 1px;
    display: inline-block; background: var(--ink); color: var(--paper);
    padding: 5px 12px; margin-bottom: 6px; align-self: flex-start; transform: rotate(-1deg);
  }
  .cat {
    display: flex; align-items: center; gap: 12px;
    border: 3px solid var(--ink); background: #fff;
    padding: 12px 14px; font-weight: 700; font-size: 15px; cursor: pointer;
    transition: transform .1s, box-shadow .1s;
  }
  .cat:hover { transform: translate(-2px,-2px); box-shadow: var(--shadow); }
  .cat.active { background: var(--yellow); box-shadow: var(--shadow); transform: translate(-2px,-2px); }
  .cat .swatch { width: 16px; height: 16px; border: 2.5px solid var(--ink); flex-shrink: 0; }
  .cat .count {
    margin-left: auto; font-size: 13px; background: var(--ink); color: var(--paper);
    padding: 1px 9px; border-radius: 99px;
  }
  .add-cat {
    margin-top: auto;
    border: 3px dashed var(--ink); background: transparent; font: inherit; font-weight: 700;
    padding: 12px; cursor: pointer; text-transform: uppercase; font-size: 13px;
  }
  .add-cat:hover { background: var(--lilac); }

  /* ---- canvas ---- */
  main { position: relative; overflow: hidden; }
  .bubble {
    position: absolute; border-radius: 50%;
    border: 3px solid var(--ink);
    display: grid; place-items: center; text-align: center;
    font-family: 'Archivo', sans-serif; font-weight: 700; line-height: 1.25;
    padding: 20px; cursor: grab;
    box-shadow: 6px 6px 0 var(--ink);
    transition: transform .12s;
  }
  .bubble:hover { transform: translate(-3px,-3px) rotate(2deg); box-shadow: 9px 9px 0 var(--ink); }
  .bubble small { font-family: 'Space Grotesk', sans-serif; font-weight: 500; font-size: 11.5px; margin-top: 6px; display: block; }
  .wobble-a { animation: wobbleA 5s ease-in-out infinite alternate; }
  .wobble-b { animation: wobbleB 6s ease-in-out infinite alternate; }
  @keyframes wobbleA { to { translate: 0 -14px; rotate: 1.5deg; } }
  @keyframes wobbleB { to { translate: 0 12px; rotate: -1.5deg; } }

  .sticker {
    position: absolute; top: -10px; right: -6px;
    background: var(--coral); border: 2.5px solid var(--ink);
    font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 700;
    padding: 4px 10px; transform: rotate(8deg); box-shadow: 2px 2px 0 var(--ink);
  }
  .done-stamp {
    position: absolute; bottom: -4px; left: -10px;
    border: 2.5px solid var(--ink); background: var(--lime);
    font-size: 11px; font-weight: 700; padding: 4px 10px; transform: rotate(-7deg);
  }

  .hint {
    position: absolute; bottom: 24px; left: 28px;
    border: 3px solid var(--ink); background: #fff; box-shadow: var(--shadow);
    padding: 10px 18px; font-size: 13px; font-weight: 700; transform: rotate(-1deg);
  }

  /* ---- FAB ---- */
  .fab {
    position: fixed; right: 40px; bottom: 40px;
    width: 76px; height: 76px; border-radius: 50%;
    border: 3.5px solid var(--ink); background: var(--coral);
    font-family: 'Archivo', sans-serif; font-size: 38px; font-weight: 900; color: var(--ink);
    cursor: pointer; box-shadow: 6px 6px 0 var(--ink);
    transition: transform .12s, box-shadow .12s;
  }
  .fab:hover { transform: translate(-3px,-3px); box-shadow: 9px 9px 0 var(--ink); }
  .fab:active { transform: translate(4px,4px); box-shadow: 1px 1px 0 var(--ink); }
</style>
</head>
<body>
  <header>
    <div class="logo">TO<span>ROUND</span></div>
    <div class="search">⌕ SEARCH TASKS…</div>
    <div class="spacer"></div>
    <div class="tab-group">
      <button class="tab active">Bubbles</button>
      <button class="tab">List</button>
      <button class="tab">Mind map</button>
    </div>
    <div class="avatar">DT</div>
  </header>

  <aside>
    <h2>Categories</h2>
    <div class="cat active"><span class="swatch" style="background:var(--yellow)"></span>Work<span class="count">8</span></div>
    <div class="cat"><span class="swatch" style="background:var(--lime)"></span>Home<span class="count">4</span></div>
    <div class="cat"><span class="swatch" style="background:var(--coral)"></span>Health<span class="count">3</span></div>
    <div class="cat"><span class="swatch" style="background:var(--sky)"></span>Ideas<span class="count">6</span></div>
    <div class="cat"><span class="swatch" style="background:var(--lilac)"></span>No category<span class="count">2</span></div>
    <button class="add-cat">+ New category</button>
  </aside>

  <main>
    <div class="bubble wobble-a" style="width:200px;height:200px;top:12%;left:8%;background:var(--yellow)">
      Ship release 0.0.56
      <small>WORK · TODAY</small>
      <span class="sticker">DUE 18:00</span>
    </div>
    <div class="bubble wobble-b" style="width:150px;height:150px;top:55%;left:20%;background:var(--lime)">
      Water the plants
      <small>HOME</small>
    </div>
    <div class="bubble wobble-a" style="width:175px;height:175px;top:20%;left:42%;background:var(--coral)">
      Morning run 5 km
      <small>HEALTH · DAILY</small>
    </div>
    <div class="bubble wobble-b" style="width:135px;height:135px;top:60%;left:52%;background:var(--sky)">
      Mind-map for Q3
      <small>IDEAS</small>
    </div>
    <div class="bubble wobble-a" style="width:125px;height:125px;top:10%;left:72%;background:var(--lilac)">
      Code review
      <small>WORK</small>
    </div>
    <div class="bubble wobble-b" style="width:115px;height:115px;top:46%;left:76%;background:#fff">
      Buy groceries
      <small>HOME</small>
      <span class="done-stamp">DONE ✓</span>
    </div>
    <div class="hint">🤏 DRAG THE BUBBLES — THEY BOUNCE!</div>
  </main>

  <button class="fab" title="Add bubble">+</button>
</body>
</html>
